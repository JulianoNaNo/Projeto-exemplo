<!DOCTYPE html>


<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações controle de gastos</title>
    <link rel="stylesheet" href="../../../global.css">
    <link rel="stylesheet" href="transactions.css">
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
    <script src="../../../firebaseInit.js"></script>
    <script src="../../../auth-guard.js"></script>
    <script src="../../loading.js"></script>
    <script src="../../services/transaction.service.js"></script>
    <script src="transactions.js" defer></script>
    
</head>
<body>
    <header>
        <button type="button" onclick="logout()" class="btn-logout">Sair</button>
    </header>
    <main>
        <form class="transaction-container">
            <h1>Adicionar Transação</h1>
            <div class="inputField">
                <input type="radio" name="transactionType" id="income"/>
                <label for="income">Receita</label>
                <input type="radio" name="transactionType" checked id="expense"/>
                <label for="expense">Despesa</label>
            </div>
            <div class="inputField">
                <label class="form-field">Data da transação *</label><br>
            <span class="error" id="date-required-error">Data obrigatória / Invalida</span>
                <input type="date" onchange="onChangeDate()" id="date"/>
            </div>
            <div class="inputField">
                <label class="form-field">Moeda *</label><br>
                <select id="currency">
                    <option value="BRL" selected>Real (R$)</option>
                    <option value="USD">Dólar (US$)</option>
                    <option value="EUR">Euro (€)</option>
                </select>
            </div>
            <div class="inputField">
                <label class="form-field">Valor *</label><br>
                <span class="error" id="value-required-error">Valor obrigatório / Válido</span>
                <span class="error" id="value-less-or-equal-to-zero-error">Valor deve ser maior que 0</span>
                <input type="number" placeholder="0.00" onchange="onChangeValue()" id="value"/>
            </div>
            <div class="inputField">
                <label class="form-field">Tipo de Transação *</label><br>
                <span class="error" id="transaction-type-required-error">Tipo de transação obrigatório</span>
                <select onchange="onChangeTransactionType()" id="transaction-type">
                    <option value="" >--Selecione um tipo de transação--</option>
                    <option >Aluguel</option>
                    <option >Alimentação</option>
                    <option >Supermercado</option>
                    <option >Transporte</option>
                    <option >Play5</option>
                    <option >Shopee</option>
                    <option >Salário</option>
                    <option >Free lancer</option>
                    <option >Assinaturas</option>
                    <option >Outros</option>
                </select>
            </div>
            <div class="inputField">
                <label class="form-field">Descrição</label><br>
                <input type="text" id="description"/>
            </div>
            <button type="button" class="btn-primary" disabled="true" id="save-button" onclick="saveTransaction()">Salvar</button>
            <button type="button" class="btn-secondary">Cancelar</button>
        </form>
    </main>
</body>

</html>
